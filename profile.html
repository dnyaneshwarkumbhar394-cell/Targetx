<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<div class="profile-card">

<img
id="profileImage"
src="https://via.placeholder.com/150">

<h1 id="userName">

Your Name

</h1>

<p>

Keep Completing Your Daily Targets 🚀

</p>

</div>

<div class="card">

<h2>🔥 Current Streak</h2>

<h1 id="streakCount">

0 Days

</h1>

</div>

<div class="card">

<h2>🎯 Today's Progress</h2>

<h1 id="todayProgress">

0%

</h1>

</div>

<div class="card">

<h2>🏆 Achievement</h2>

<p id="badge">

🌱 Beginner

</p>

</div>

<button
onclick="location.href='index.html'">

🏠 Home

</button>

</div>

<script src="profile.js"></script>

</body>

</html>
